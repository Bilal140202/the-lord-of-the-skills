name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt
          pip install pytest pytest-cov black isort flake8

      - name: Lint with flake8
        run: |
          flake8 crawler/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 crawler/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics || true

      - name: Check formatting with black
        run: |
          black --check --diff crawler/ tests/ || true

      - name: Check import order with isort
        run: |
          isort --check-only --diff crawler/ tests/ || true

      - name: Run tests with pytest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pytest tests/ -v --cov=crawler --cov-report=xml --cov-report=term-missing || true

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          for f in README.md QUICKSTART.md KINGDOMS.md FRAMEWORKS.md ROADMAP.md FAQ.md MANIFEST.md DEDUP.md CHANGELOG.md CONTRIBUTING.md CODE_OF_CONDUCT.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            echo "OK $f"
          done

      - name: Check internal links
        run: |
          grep -rEoh '\]\([^)]+\.md[^)]*\)' README.md QUICKSTART.md KINGDOMS.md FRAMEWORKS.md ROADMAP.md FAQ.md MANIFEST.md DEDUP.md 2>/dev/null | \
            sed -E 's/\]\(([^)]+)\)/\1/' | \
            grep -v '^http' | \
            sed 's/#.*//' | \
            sort -u | \
            while read link; do
              if [ -n "$link" ] && [ ! -f "$link" ]; then
                echo "WARNING: Dead link: $link"
              fi
            done
          echo "Link check complete (warnings only)"

  build-artifacts:
    name: Verify Catalog Artifacts
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt

      - name: Verify catalogs exist
        run: |
          if [ -f catalogs/Lord_of_the_Skills_Catalog.pdf ]; then
            echo "OK PDF catalog present ($(stat -c%s catalogs/Lord_of_the_Skills_Catalog.pdf) bytes)"
          else
            echo "FAIL PDF catalog missing"
            exit 1
          fi
          if [ -f catalogs/Lord_of_the_Skills_Index.xlsx ]; then
            echo "OK Excel index present ($(stat -c%s catalogs/Lord_of_the_Skills_Index.xlsx) bytes)"
          else
            echo "FAIL Excel index missing"
            exit 1
          fi

      - name: Verify kingdom structure
        run: |
          kingdoms="gondor rivendell isengard moria lothlorien mordor the-shire rohan fangorn mirkwood"
          for k in $kingdoms; do
            if [ -d "skills/$k" ]; then
              count=$(find "skills/$k" -type f | wc -l)
              echo "OK $k: $count files"
            else
              echo "FAIL Missing kingdom: $k"
              exit 1
            fi
          done

      - name: Verify crawler scripts
        run: |
          for script in crawler.py classify.py dedup.py build_package.py generate_excel.py generate_pdf.py; do
            if [ -f "crawler/$script" ]; then
              echo "OK crawler/$script"
            else
              echo "FAIL Missing: crawler/$script"
              exit 1
            fi
          done
