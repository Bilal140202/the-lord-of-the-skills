# Dependabot configuration for yakOS.
#
# yakOS is primarily bash + a small amount of Python (SDK dispatch
# scripts at cli/lib/runtimes/*.py). The only dependency surface
# Dependabot can manage is the GitHub Actions used by .github/workflows/.
#
# Python deps (claude-agent-sdk, google-antigravity, anyio) are
# documented in CHANGELOG.md but not pinned in a manifest file — they
# are installed by operators in their own environments, not by
# the framework. Adding a requirements.txt for Dependabot to scan
# would imply we manage their lifecycle, which we don't.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies
      - github-actions
    reviewers:
      - bakw00ds
