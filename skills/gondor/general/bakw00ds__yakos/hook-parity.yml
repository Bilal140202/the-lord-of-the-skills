name: Hook Parity Audit (Q7 compat window)

# Compatibility audit CI step (Phase 3, Q7).
#
# For one release cycle the Go Tier-0 hooks and their bash counterparts must
# produce IDENTICAL artifact bytes (exit code + NDJSON log entries) for the
# same HookInput fixture. This job enforces that contract.
#
# Scope: 21 hooks with deterministic fixture payloads.
# Each fixture must be deterministic: timestamps injected via YAKOS_HOOK_NOW,
# no real network, no random.
#
# Fails CI on any divergence between Go-native and bash outputs.
#
# Bash hook name convention: dash-separated (e.g. budget-guard.sh).
# Fixture directory convention: concatenated lowercase (e.g. budgetguard/).
#
# Hook → fixture-dir → bash-script mapping:
#   budgetguard          → budget-guard.sh
#   contextinject        → context-inject.sh
#   contextthreshold     → context-threshold.sh
#   cyclecounter         → cycle-counter.sh
#   mailboxmirror        → mailbox-mirror.sh
#   outputinjectionscan  → output-injection-scan.sh
#   pathallowlist        → path-allowlist.sh
#   pathlog              → path-log.sh
#   peerclaim            → peer-claim.sh
#   peerclaimconfirm     → peer-claim-confirm.sh
#   planoutcomecapture   → plan-outcome-capture.sh
#   planqualitygate      → plan-quality-gate.sh
#   retrodispatch        → retro-dispatch.sh
#   secretscan           → secret-scan.sh
#   sessionendcheck      → session-end-check.sh
#   supervisorackgate    → supervisor-ack-gate.sh
#   supervisorgate       → supervisor-gate.sh
#   supervisorstream     → supervisor-stream.sh
#   taskcompletedispatch → task-complete-dispatch.sh
#   taskdependencygate   → task-dependency-gate.sh
#   teamlifecycle        → team-lifecycle.sh

on:
  push:
    branches: [main]
    paths:
      - 'cli-go/internal/hooks/**'
      - 'lib/hooks/*.sh'
      - '.github/fixtures/hooks/**'
      - '.github/workflows/hook-parity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cli-go/internal/hooks/**'
      - 'lib/hooks/*.sh'
      - '.github/fixtures/hooks/**'
      - '.github/workflows/hook-parity.yml'
  workflow_dispatch:

jobs:
  hook-parity:
    name: hook parity audit (${{ matrix.os }})
    # Run only on Linux/macOS where bash is reliably available.
    # True Windows-native parity (no bash) is not tested here — that is the
    # Phase 3 goal state, not the compat-window baseline.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.25'
          cache-dependency-path: cli-go/go.sum

      - name: Download modules
        working-directory: cli-go
        run: go mod download

      - name: go vet (hooks packages)
        working-directory: cli-go
        run: go vet ./internal/hooks/... ./internal/hooksinstall/...

      - name: Run Go-native hook parity tests
        # The hook-parity tests live in cli-go/internal/hooks/runner/ and use
        # YAKOS_HOOKS=hybrid + fixture HookInputs to detect divergence.
        # YAKOS_HOOK_NOW is injected to pin timestamps to a fixed value so
        # artifact bytes are deterministic.
        working-directory: cli-go
        env:
          YAKOS_HOOK_NOW: "2026-01-01T00:00:00Z"
          YAKOS_HOOKS: "go"
        run: go test -count=1 -race -timeout 60s ./internal/hooks/...

      - name: Verify fixture files are valid JSON
        shell: bash
        run: |
          set -euo pipefail
          echo "Validating fixture JSON files..."
          fail=0
          for f in .github/fixtures/hooks/**/*.json; do
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "ERROR: invalid JSON: $f"
              fail=1
            else
              echo "  ok: $f"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more fixture files have invalid JSON"
            exit 1
          fi
          echo "All fixture files are valid JSON."

      # ---------------------------------------------------------------------------
      # Original 3 hooks (pre-F5; smoke tests)
      # ---------------------------------------------------------------------------

      - name: Run bash hook against cycle-counter fixtures
        shell: bash
        env:
          YAKOS_HOOK_NOW: "2026-01-01T00:00:00Z"
        run: |
          set -euo pipefail
          echo "=== cycle-counter bash hook smoke ==="
          for fixture in .github/fixtures/hooks/cycle-counter/*.json; do
            echo "  fixture: $fixture"
            bash_exit=0
            bash lib/hooks/cycle-counter.sh < "$fixture" > /dev/null 2>&1 \
              || bash_exit=$?
            echo "  bash exit: $bash_exit"
            if [ "$bash_exit" -ne 0 ]; then
              echo "ERROR: cycle-counter bash hook exited $bash_exit for $fixture (expected 0)"
              exit 1
            fi
          done
          echo "cycle-counter: bash smoke PASS"

