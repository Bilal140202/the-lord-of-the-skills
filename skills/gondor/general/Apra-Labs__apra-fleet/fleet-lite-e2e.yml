name: Fleet Lite E2E (Fleet-less)
run-name: Fleet Lite E2E ${{ inputs.suite }} - ${{ github.ref_name }}

# Fleet-less e2e: the orchestrator uses LOCAL subagents (planner/plan-reviewer/
# doer/reviewer installed by `apra-fleet install`), no fleet server, no member
# registration, no remote dispatch. Validates that the pm skill works standalone.
#
# Modeled on pm-lite-e2e.yml but installs via the fleet binary, not the pm
# install.mjs. Manual trigger only (expensive, self-hosted runners).

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Fleet-less install-path smoke. s10 = OpenCode+Ollama.'
        required: true
        type: choice
        options: [s10]
      runner:
        description: 'Runner to target. Default "self-hosted" = any available self-hosted runner. Override with a specific label (e.g. fleet-linux, fleet-macos, fleet-windows, fleet-opencode) to pin.'
        required: false
        default: 'self-hosted'
        type: string

jobs:
  e2e:
    name: 'Fleet Lite E2E - ${{ inputs.suite }}'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    env:
      GEMINI_CLI_TRUST_WORKSPACE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive provider from suite
        id: prov
        shell: bash
        run: |
          case "${{ inputs.suite }}" in
            s10) P=opencode ;;
            *) echo "::error::unknown suite ${{ inputs.suite }}"; exit 1 ;;
          esac
          echo "provider=$P" >> "$GITHUB_OUTPUT"

      - name: Verify OpenCode + Ollama if provider is opencode
        if: steps.prov.outputs.provider == 'opencode'
        shell: bash
        run: |
          echo "Verifying OpenCode CLI is installed..."
          opencode --version || { echo "::error::opencode CLI not found; install with: npm install -g opencode-ai"; exit 1; }
          ENDPOINT="http://localhost:11434/v1"
          echo "Verifying Ollama endpoint at $ENDPOINT ..."
          curl -sf "$ENDPOINT/models" > /dev/null 2>&1 \
            || curl -sf "$(echo "$ENDPOINT" | sed 's|/v1$||')/api/tags" > /dev/null 2>&1 \
            || { echo "::error::Ollama endpoint not reachable at $ENDPOINT"; exit 1; }
          echo "OpenCode CLI and Ollama endpoint verified"

      - name: Build and install fleet binary
        shell: bash
        run: |
          npm ci
          npm run build:binary
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN=$(ls dist/apra-fleet-installer-*.exe | head -1)
          else
            BIN=$(ls dist/apra-fleet-installer-* | grep -v -E '\.(blob|cjs|json|exe)$' | head -1)
          fi
          chmod +x "$BIN" 2>/dev/null || true
          "$BIN" install --force --llm ${{ steps.prov.outputs.provider }}
          if [ "$RUNNER_OS" = "Windows" ]; then
            INSTALLED_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
          else
            INSTALLED_BIN="$HOME/.apra-fleet/bin/apra-fleet"
          fi
          "$INSTALLED_BIN" --version

      - name: Verify skill + agents installed
        shell: bash
        run: |
          CFG="$HOME/.config/opencode"
          test -f "$CFG/skills/pm/SKILL.md" || { echo "::error::pm skill missing at $CFG/skills/pm/SKILL.md"; exit 1; }
          AGENTS_DIR="$HOME/.config/opencode/agents"
          for a in planner plan-reviewer doer reviewer; do
            test -f "$AGENTS_DIR/$a.md" || { echo "::error::agent $a missing at $AGENTS_DIR/$a.md"; exit 1; }
          done
          echo "skill + 4 agents present under $CFG"

      - name: Pre-flight - subagent dispatch works
        shell: bash
        run: |
          PROMPT="Dispatch ONE subagent (use your agent/subagent/task mechanism) whose only job is to reply with the exact text SUBAGENT-OK. Wait for it to finish, then print its reply and the text PMLITE-READY. Do nothing else."
          cmd=(opencode run "$PROMPT" --format json --dangerously-skip-permissions)
          TIMEOUT_BIN="$(command -v timeout || command -v gtimeout || true)"
          if [ -n "$TIMEOUT_BIN" ]; then
            out=$("$TIMEOUT_BIN" 180 "${cmd[@]}" 2>&1); rc=$?
          else
            out=$("${cmd[@]}" 2>&1); rc=$?
          fi
          echo "$out"
          if [ $rc -eq 124 ]; then echo "::error::opencode hung dispatching a subagent (timeout) -- fleet-less pm cannot run on this provider/config"; exit 1; fi
          echo "$out" | grep -q "PMLITE-READY" || { echo "::error::opencode produced no response -- start/auth issue"; exit 1; }
          echo "$out" | grep -q "SUBAGENT-OK"  || { echo "::error::opencode responded but the subagent never returned -- subagent dispatch broken"; exit 1; }
          echo "opencode: subagent dispatch OK"

      - name: Seed OpenCode config directory
        shell: bash
        run: |
          RUN_DIR="$(pwd)"
          mkdir -p "$RUN_DIR/.config/opencode"
          echo '{}' > "$RUN_DIR/.config/opencode/opencode.json"
          echo "Seeded empty opencode.json (permissions handled by --dangerously-skip-permissions)"

      - name: Run fleet-less e2e
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
          E2E_GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
        run: node .github/e2e/run-lite-e2e.mjs "${{ inputs.suite }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fleet-lite-e2e-${{ inputs.suite }}-${{ github.run_id }}
          path: /tmp/fleet-lite-e2e-*/results/
          if-no-files-found: ignore
